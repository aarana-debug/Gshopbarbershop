<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gallery Preview - Scroll Portrait Wall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Montserrat:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    :root{
      --gold:#cc1f1f; --gold-light:#e63333; --dark:#0a0a0a; --dark-2:#111111; --white:#ffffff; --muted:#bfbfbf;
      --serif: 'Playfair Display', Georgia, serif; --sans: 'Montserrat', Arial, sans-serif;
    }
    html,body{height:100%;margin:0;background:var(--dark);color:var(--white);font-family:var(--sans)}
    .container{max-width:1200px;margin:0 auto;padding:40px}
    .title-wrap{position:sticky;top:50%;transform:translateY(-50%);text-align:center;z-index:20;pointer-events:none}
    .section-label{font-family:'Dancing Script', cursive;color:var(--gold);font-size:1.25rem;margin-bottom:8px;display:block}
    .section-title{font-family:var(--serif);font-weight:900;font-size:clamp(3rem,7vw,5.5rem);line-height:1.02;margin:0;color:var(--white)}
    .hint{position:fixed;left:50%;top:60vh;transform:translateX(-50%);color:var(--gold);pointer-events:none;font-size:0.85rem;text-transform:uppercase;letter-spacing:2px}
    .wall{margin-top:50vh;margin-bottom:50vh}
    .row{display:flex;width:100%}
    .cell{flex:1;padding:8px}
    .aspect{position:relative;padding-bottom:100%;overflow:hidden;border:1px solid rgba(255,255,255,0.03);background:var(--dark-2)}
    .aspect img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:grayscale(60%) contrast(1.08);transform-origin:center bottom;transition:transform .6s ease, box-shadow .25s ease}
    .aspect:hover img{transform:scale(1.04);box-shadow:0 18px 40px rgba(204,31,31,0.18)}
    .caption{position:absolute;left:0;right:0;bottom:-2px;transform:translateY(100%);display:flex;justify-content:space-between;padding:8px 10px;font-size:12px;color:var(--muted);text-transform:uppercase}
    .caption .cap-name{color:var(--gold);font-weight:700}
    .caption .cap-role{color:var(--muted);font-weight:600}
    .note{max-width:56ch;margin:24px auto 0;font-size:13px;color:var(--muted);text-align:center}
    @media (max-width:768px){ h1{font-size:40px} .cell{padding:6px} }
  </style>
</head>
<body>
  <div class="title-wrap">
    <span class="section-label">Gallery</span>
    <h1 class="section-title">Our Gallery</h1>
  </div>
  <div class="hint">scroll down to see effect</div>
  <div class="container">
    <div id="wall" class="wall"></div>
    <p class="note">This is a live preview using your gallery images. If you like it, I'll integrate it into the site.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);
    const images = [
      "GALLERY PIC 2.PNG","GALLERY PIC 3.PNG","GALLERY PIC 4.PNG","GALLERY PIC 5.PNG","GALLERY PIC 6.PNG","GALLERY PIC 7.PNG","GALLERY PIC 8.PNG","GALLERY PIC 9.PNG","GALLERY PIC 10.PNG","GALLERY PIC 11.PNG","GALLERY PIC 12.PNG","GALLERY PIC 13.PNG","GALLERY PIC 14.PNG","GALLERY PIC 15.PNG","GALLERY PIC 16.PNG","GALLERY PIC 17.PNG"
    ];

    function buildLayout(count, cols){
      const rows=[];let i=0;let r=0;while(i<count){const row=new Array(cols).fill(-1);const a=(r*2+(r%2))%cols;row[a]=i++;if(r%3===0&&i<count){let b=(a+2)%cols;if(b===a)b=(a+1)%cols;row[b]=i++;}rows.push(row);r++;}return rows;
    }

    function colsForWidth(desired){
      const w = window.innerWidth; if(w>=1024) return desired; if(w>=640) return Math.min(desired,3); return Math.min(desired,2);
    }

    function render(){
      const cols = colsForWidth(4);
      const layout = buildLayout(images.length, cols);
      const wall = document.getElementById('wall'); wall.innerHTML='';
      layout.forEach((row,ri)=>{
        const rowEl = document.createElement('div'); rowEl.className='row';
        row.forEach((idx,ci)=>{
          const cell = document.createElement('div'); cell.className='cell';
          if(idx===-1){ cell.innerHTML='<div class="aspect"></div>'; rowEl.appendChild(cell); return; }
          const src = images[idx];
          const aspect = document.createElement('div'); aspect.className='aspect spw-item';
          const img = document.createElement('img'); img.src = src; img.alt = src; aspect.appendChild(img);
          const caption = document.createElement('div'); caption.className='caption'; caption.innerHTML = `<span class="cap-name">${src.replace('GALLERY PIC ','').replace('.PNG','')}</span><span class="cap-role">(Photo)</span>`;
          aspect.appendChild(caption);
          cell.appendChild(aspect);
          rowEl.appendChild(cell);
        });
        wall.appendChild(rowEl);
      });

      // GSAP animations
      gsap.utils.toArray('.spw-item').forEach(el=>{
        gsap.fromTo(el,{scale:0},{scale:1,scrollTrigger:{trigger:el,start:'top bottom',end:'bottom top',scrub:true}});
      });

      // hide hint
      gsap.to('.hint',{autoAlpha:0,scrollTrigger:{trigger:'#wall',start:'top top',end:'+=40%',scrub:true}});
    }

    window.addEventListener('resize', ()=>{ render(); ScrollTrigger.refresh(); });
    render();
  </script>
</body>
</html>
